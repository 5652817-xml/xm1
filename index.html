<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>冒险岛 MapleStory 风格小游戏</title>
<style>
  body{margin:0;background:linear-gradient(#87ceeb,#b0e0e6);display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:"Microsoft YaHei",sans-serif;color:#fff;}
  h1{margin:6px;text-shadow:2px 2px 0 #d2691e;color:#fff8dc;}
  #wrap{position:relative;}
  canvas{background:linear-gradient(#87ceeb 0%,#b9e7ff 60%,#7ec850 60%,#5fa83d 100%);border:4px solid #5a3a1b;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.3);}
  #ui{position:absolute;top:10px;left:14px;font-size:18px;text-shadow:1px 1px 0 #000;line-height:1.6em;}
  #tips{margin-top:8px;color:#333;font-size:14px;text-shadow:none;}
  #overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.55);color:#fff;border-radius:4px;}
  #overlay h2{font-size:44px;margin:8px;}
  #overlay button{padding:8px 24px;font-size:18px;background:#ffcc33;border:2px solid #d2691e;border-radius:6px;cursor:pointer;}
</style>
</head>
<body>
<h1>🍄 冒险岛 MapleStory 🍄</h1>
<div id="wrap">
  <canvas id="game" width="800" height="500"></canvas>
  <div id="ui">
    <div>💰 金币：<span id="coin">0</span> / 10</div>
    <div>⚔️ 击杀：<span id="kill">0</span></div>
    <div>❤️ 生命：<span id="hp">♥♥♥</span></div>
  </div>
  <div id="overlay">
    <h2 id="msg"></h2>
    <button onclick="location.reload()">再来一次</button>
  </div>
</div>
<div id="tips">操作：← → 移动 ｜ ↑ / 空格 跳跃 ｜ X / J 挥剑</div>

<script>
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const W = cvs.width, H = cvs.height;

const keys = {};
addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(['arrowleft','arrowright','arrowup',' '].includes(e.key.toLowerCase()))e.preventDefault(); });
addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

const GROUND_Y = H - 50;

// 平台
const platforms = [
  {x:0,    y:GROUND_Y, w:W,   h:50},
  {x:80,   y:380,      w:140, h:14},
  {x:300,  y:320,      w:160, h:14},
  {x:540,  y:260,      w:160, h:14},
  {x:120,  y:200,      w:120, h:14},
];

// 玩家
const player = {
  x:50, y:300, w:28, h:36,
  vx:0, vy:0, speed:3.2, jump:11,
  onGround:false, face:1,
  hp:3, coins:0, kills:0,
  attacking:0, atkCD:0, invincible:0,
};

// 怪物
const mobs = [
  {x:330, y:320-32, w:30, h:32, dir:-1, range:[300,440], alive:true},
  {x:560, y:260-32, w:30, h:32, dir: 1, range:[540,680], alive:true},
  {x:100, y:380-32, w:30, h:32, dir: 1, range:[80,200],  alive:true},
  {x:140, y:200-32, w:30, h:32, dir:-1, range:[120,220], alive:true},
];

// 金币
const coins = [
  {x:120,y:350},{x:170,y:350},{x:340,y:290},{x:400,y:290},
  {x:580,y:230},{x:640,y:230},{x:160,y:170},{x:200,y:170},
  {x:420,y:GROUND_Y-30},{x:720,y:GROUND_Y-30},
].map(c => ({...c,w:14,h:14,taken:false}));

let gameOver = false, win = false;

function rectHit(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function update(){
  if(gameOver||win) return;

  // 输入
  player.vx = 0;
  if(keys['arrowleft'])  { player.vx = -player.speed; player.face = -1; }
  if(keys['arrowright']) { player.vx =  player.speed; player.face =  1; }
  if((keys['arrowup']||keys[' ']) && player.onGround){
    player.vy = -player.jump; player.onGround = false;
  }
  if((keys['x']||keys['j']) && player.atkCD<=0){
    player.attacking = 12; player.atkCD = 22;
  }
  if(player.attacking>0) player.attacking--;
  if(player.atkCD>0)     player.atkCD--;
  if(player.invincible>0)player.invincible--;

  // 重力
  player.vy += 0.55;
  if(player.vy > 14) player.vy = 14;

  // 水平移动 & 边界
  player.x += player.vx;
  if(player.x < 0) player.x = 0;
  if(player.x+player.w > W) player.x = W - player.w;

  // 垂直移动 & 平台
  player.y += player.vy;
  player.onGround = false;
  for(const p of platforms){
    // 从上方落到平台
    if(player.x+player.w > p.x && player.x < p.x+p.w){
      if(player.vy >= 0 && player.y+player.h >= p.y && player.y+player.h - player.vy <= p.y+1){
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // 怪物巡逻
  for(const m of mobs){
    if(!m.alive) continue;
    m.x += m.dir * 1.2;
    if(m.x < m.range[0]){ m.x = m.range[0]; m.dir = 1; }
    if(m.x+m.w > m.range[1]){ m.x = m.range[1]-m.w; m.dir = -1; }

    // 玩家碰到怪
    if(rectHit(player,m) && player.invincible<=0){
      player.hp--; player.invincible = 70;
      player.vy = -7; player.vx = 0;
      player.x += (player.x<m.x?-20:20);
      if(player.hp<=0){ gameOver = true; showOverlay('💀 Game Over'); }
    }

    // 挥剑击杀
    if(player.attacking>0){
      const sx = player.face>0 ? player.x+player.w : player.x-32;
      const sword = {x:sx, y:player.y+4, w:32, h:28};
      if(rectHit(sword,m)){
        m.alive = false; player.kills++;
      }
    }
  }

  // 金币
  for(const c of coins){
    if(!c.taken && rectHit(player,c)){
      c.taken = true; player.coins++;
    }
  }

  // 掉出地图
  if(player.y > H){
    player.hp--; player.invincible = 70;
    player.x = 50; player.y = 200; player.vy = 0;
    if(player.hp<=0){ gameOver = true; showOverlay('💀 Game Over'); }
  }

  if(player.coins>=10){ win = true; showOverlay('🏆 Victory!'); }

  // UI
  document.getElementById('coin').textContent = player.coins;
  document.getElementById('kill').textContent = player.kills;
  document.getElementById('hp').textContent = '♥'.repeat(Math.max(0,player.hp)) || '—';
}

function showOverlay(text){
  document.getElementById('msg').textContent = text;
  document.getElementById('overlay').style.display = 'flex';
}

// 绘制
function drawPlayer(){
  const blink = player.invincible>0 && Math.floor(player.invincible/4)%2===0;
  if(blink) return;
  const x=player.x, y=player.y, w=player.w, h=player.h;
  // 帽子
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(x-2, y, w+4, 10);
  ctx.fillRect(x+w/2-3, y-5, 6, 5);
  // 脸
  ctx.fillStyle = '#ffe4b5';
  ctx.fillRect(x, y+10, w, 14);
  // 眼睛
  ctx.fillStyle = '#000';
  ctx.fillRect(x+ (player.face>0?16:6), y+14, 4, 4);
  ctx.fillRect(x+ (player.face>0?6:16), y+14, 4, 4);
  // 嘴
  ctx.fillStyle = '#a52a2a';
  ctx.fillRect(x+10, y+20, 8, 2);
  // 身体
  ctx.fillStyle = '#2266cc';
  ctx.fillRect(x+2, y+24, w-4, 12);
  // 剑光
  if(player.attacking>0){
    const sx = player.face>0 ? x+w : x-32;
    ctx.fillStyle = 'rgba(255,255,200,0.85)';
    ctx.fillRect(sx, y+4, 32, 28);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, y+4, 32, 28);
  }
}

function drawMob(m){
  if(!m.alive) return;
  const x=m.x, y=m.y;
  // 蘑菇身体
  ctx.fillStyle = '#8a2be2';
  ctx.beginPath();
  ctx.arc(x+15, y+12, 15, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(x, y+12, 30, 14);
  // 白色斑点
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x+8,  y+8, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+22, y+10,4, 0, Math.PI*2); ctx.fill();
  // 眼睛
  ctx.fillStyle = '#000';
  ctx.fillRect(x+8,  y+18, 4, 4);
  ctx.fillRect(x+18, y+18, 4, 4);
}

function drawCoin(c){
  if(c.taken) return;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(c.x+7, c.y+7, 8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#b8860b';
  ctx.fillRect(c.x+6, c.y+3, 2, 8);
}

function drawPlatform(p, isGround){
  if(isGround){
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#5fa83d';
    ctx.fillRect(p.x, p.y, p.w, 6);
  } else {
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#a0522d';
    ctx.fillRect(p.x, p.y, p.w, 4);
    ctx.strokeStyle = '#5a3a1b';
    ctx.strokeRect(p.x, p.y, p.w, p.h);
  }
}

function drawClouds(){
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  const clouds=[[80,60,40],[200,90,30],[420,50,46],[620,80,34],[720,40,28]];
  for(const [x,y,r] of clouds){
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.arc(x+r*0.8,y+4,r*0.8,0,Math.PI*2);
    ctx.arc(x-r*0.8,y+4,r*0.7,0,Math.PI*2);
    ctx.fill();
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawClouds();
  for(let i=0;i<platforms.length;i++) drawPlatform(platforms[i], i===0);
  for(const c of coins) drawCoin(c);
  for(const m of mobs)  drawMob(m);
  drawPlayer();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
